<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ _t('login.header') }}</title>
    <script>
        window.CURRENT_LANG = "{{ CURRENT_LANG }}";
    </script>
    <script type="application/json" id="i18n-data">{{ I18N | tojson | safe }}</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 40px 32px 32px 32px;
        }
        .login-container h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 32px;
            font-family: 'Georgia', serif;
            text-align: center;
        }
        .form-label {
            font-weight: 500;
            margin-top: 16px;
        }
        .form-control {
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .btn-login {
            background: #0074e8;
            color: #fff;
            font-size: 1.1rem;
            border-radius: 10px;
            padding: 10px 0;
            margin-top: 24px;
            width: 100%;
        }
        .btn-login:hover {
            background: #005ecb;
        }
        .form-check-label {
            font-size: 0.98rem;
        }
        .flash {
            color: #d32f2f;
            margin-bottom: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- <div class="window-header d-flex align-items-center justify-content-between"> -->
    <div class="align-items-center "></div>
        <div class="lang-link">
            <select id="lang_select">
                <option value="ru" {% if CURRENT_LANG=='ru' %}selected{% endif %}>Русский</option>
                <option value="en" {% if CURRENT_LANG=='en' %}selected{% endif %}>English</option>
            </select>
        </div>
    </div>
    <div class="login-container">
        <h2>{{ _t('login.header') }}</h2>
        {% include '_flash.html' %}
        <form method="post">
            <label for="username" class="form-label">{{ _t('label.username') }}</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus>
            <label for="password" class="form-label">{{ _t('label.password') }}</label>
            <input type="password" id="password" name="password" class="form-control" required>
            <button type="submit" class="btn btn-login">{{ _t('login.submit') }}</button>
        </form>
    </div>
    <script src="/static/balloons.js"></script>
    <script>
    document.getElementById('lang_select')?.addEventListener('change', function(e){
        const lang = e.target.value;
        fetch('/set_lang', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({lang}), credentials:'same-origin'})
            .then(r => r.json()).then(j => { if (j && j.status==='ok') window.location.reload(); else alert('Language switch failed'); })
            .catch(() => alert('Language switch failed'));
    });
    </script>
</body>
</html>
